<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>检测 CSS 动画的 FPS 值 - PerformanceObserver 方式</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: linear-gradient(135deg, #4a148c 0%, #7b1fa2 100%);
        color: #fff;
        min-height: 100vh;
        padding: 24px;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 4px;
      }
      .subtitle {
        opacity: 0.8;
        margin-bottom: 20px;
        font-size: 14px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .metric {
        background: rgba(0, 0, 0, 0.2);
        padding: 14px;
        border-radius: 8px;
        text-align: center;
      }
      .metric-label {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 4px;
      }
      .metric-value {
        font-size: 28px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .metric-value.good {
        color: #4caf50;
      }
      .metric-value.warn {
        color: #ff9800;
      }
      .metric-value.bad {
        color: #f44336;
      }
      .warning {
        display: none;
        background: rgba(244, 67, 54, 0.2);
        border: 1px solid #f44336;
        padding: 10px 14px;
        border-radius: 8px;
        margin-top: 12px;
        font-size: 14px;
        animation: pulse 0.5s ease;
      }
      @keyframes pulse {
        0% {
          transform: scale(0.98);
          opacity: 0.5;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .controls {
        display: flex;
        gap: 12px;
        margin-top: 12px;
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.1s,
          background 0.2s;
      }
      button:active {
        transform: scale(0.96);
      }
      .jank-btn {
        background: #ff9800;
        color: #fff;
      }
      .jank-btn.active {
        background: #f44336;
      }
      .reset-btn {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
      }
      .stage {
        height: 140px;
        position: relative;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        margin-top: 12px;
      }
      .mover {
        position: absolute;
        top: 50%;
        left: 0;
        width: 50px;
        height: 50px;
        margin-top: -25px;
        border-radius: 8px;
        background: linear-gradient(135deg, #e1bee7, #ba68c8);
        box-shadow: 0 0 20px rgba(225, 190, 231, 0.6);
        animation: slide 2.5s ease-in-out infinite alternate;
      }
      .rotator {
        position: absolute;
        right: 20px;
        top: 20px;
        width: 50px;
        height: 50px;
        background: conic-gradient(from 0deg, #ffeb3b, #ff9800, #f44336, #ffeb3b);
        border-radius: 50%;
        animation: rotate 1.5s linear infinite;
      }
      @keyframes slide {
        0% {
          left: 0;
          transform: rotate(0deg);
        }
        100% {
          left: calc(100% - 50px);
          transform: rotate(360deg);
        }
      }
      @keyframes rotate {
        to {
          transform: rotate(360deg);
        }
      }
      .jank-list {
        margin-top: 12px;
        max-height: 200px;
        overflow-y: auto;
        font-size: 13px;
        font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
      }
      .jank-item {
        background: rgba(0, 0, 0, 0.2);
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 6px;
        border-left: 3px solid #f44336;
      }
      .jank-item.placeholder {
        border-left-color: #888;
        opacity: 0.7;
      }
      .note {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 8px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>检测 CSS 动画的 FPS 值</h1>
      <p class="subtitle">方式二：使用 PerformanceObserver 监听 longtask，检测卡顿与丢帧</p>

      <div class="card">
        <div class="metrics">
          <div class="metric">
            <div class="metric-label">实时 FPS（rAF 估算）</div>
            <div class="metric-value good" id="fps-value">60.0</div>
          </div>
          <div class="metric">
            <div class="metric-label">Long Task 数量</div>
            <div class="metric-value" id="long-task-count">0</div>
          </div>
          <div class="metric">
            <div class="metric-label">估算丢帧总数</div>
            <div class="metric-value" id="dropped-frames">0</div>
          </div>
        </div>
        <div class="warning" id="jank-warning">检测到卡顿！主线程被长时间占用，已发生丢帧</div>
      </div>

      <div class="card">
        <div class="metric-label">CSS 动画舞台</div>
        <div class="stage">
          <div class="mover"></div>
          <div class="rotator"></div>
        </div>
        <div class="controls">
          <button id="toggle-jank-btn" class="jank-btn">开启卡顿任务</button>
          <button id="reset-btn" class="reset-btn">重置统计</button>
        </div>
        <p class="note">
          点击"开启卡顿任务"会在主线程上同步执行约 80ms 的繁重计算，触发 longtask
          事件并导致丢帧，可观察 FPS 下降与 long task 计数上升。
        </p>
      </div>

      <div class="card">
        <div class="metric-label">最近卡顿事件（Long Task 列表）</div>
        <div class="jank-list" id="jank-list">
          <div class="jank-item placeholder">
            暂无 long task 记录，开启卡顿任务后这里会显示事件...
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/main.ts"></script>
  </body>
</html>
