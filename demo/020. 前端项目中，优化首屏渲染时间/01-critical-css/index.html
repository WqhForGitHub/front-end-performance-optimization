<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关键 CSS 内联优化 - 优化首屏渲染时间</title>
    <!--
      关键 CSS（Critical CSS）示例：内联首屏可见区域所需的最小样式。
      浏览器解析到 <style> 后无需等待外部 CSS 请求即可完成首次绘制（FCP）。
    -->
    <style id="critical-css">
      :root {
        --bg: #0f1115;
        --panel: #1a1d24;
        --text: #e8eaf0;
        --muted: #8b94a5;
        --accent: #4ade80;
        --warn: #fbbf24;
        --danger: #f87171;
        --border: #2a2f3a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        min-height: 100vh;
      }
      #root {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 20px 80px;
      }
      .app-header {
        padding: 24px 0 12px;
        border-bottom: 1px solid var(--border);
      }
      .app-header h1 {
        font-size: 22px;
        margin: 0 0 6px;
        font-weight: 700;
      }
      .app-header p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      /* 非关键 CSS：通过 loadCSS 模式异步加载，不阻塞首屏 */
      .non-critical-async {
        visibility: hidden;
      }
    </style>
    <!--
      异步加载非关键 CSS 的兜底模式（loadCSS pattern）：
      <link rel="preload" as="style" href="/non-critical.css" onload="this.rel='stylesheet'">
      <noscript><link rel="stylesheet" href="/non-critical.css"></noscript>
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
