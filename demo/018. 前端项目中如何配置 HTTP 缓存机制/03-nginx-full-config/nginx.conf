# ============================================================
# Nginx 完整 HTTP 缓存配置示例
# 适用：单页应用 (SPA) + 静态资源，前端构建产物带 contenthash
# 部署：将本文件放到 nginx 的 conf 目录，或用 docker 挂载
#   docker run -d -p 5236:80 \
#     -v $(pwd)/dist:/usr/share/nginx/html \
#     -v $(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf \
#     nginx:alpine
# ============================================================

# ---- Gzip 压缩（减少传输体积，间接提升缓存命中率感受） ----
gzip on;
gzip_vary on;                 # 响应带 Vary: Accept-Encoding，避免缓存错乱
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css text/javascript
           application/javascript application/json
           application/xml image/svg+xml;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 开启 ETag（默认开启）与 Last-Modified，用于协商缓存
    etag on;

    # ----------------------------------------------------------
    # 1. HTML 入口文件：no-cache，每次协商
    #    保证用户拿到引用了最新 hash 的 JS/CSS
    # ----------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = / {
        add_header Cache-Control "no-cache" always;
        try_files $uri /index.html;
    }

    # ----------------------------------------------------------
    # 2. 带 hash 的 JS / CSS：永久强缓存
    #    文件名含 contenthash，内容变更即换名 -> 可放心 immutable
    # ----------------------------------------------------------
    location ~* \.(js|css)$ {
        # 匹配带 hash 的产物（Vite 默认 [name].[hash].js）
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ----------------------------------------------------------
    # 3. 图片 / 字体 / 媒体：长强缓存
    #    这类资源通常不频繁变更
    # ----------------------------------------------------------
    location ~* \.(png|jpe?g|gif|webp|avif|ico|bmp|svg)$ {
        add_header Cache-Control "public, max-age=2592000" always;  # 30 天
        access_log off;
    }

    location ~* \.(woff2?|eot|ttf|otf|ttc)$ {
        add_header Cache-Control "public, max-age=31536000" always; # 1 年
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
    }

    location ~* \.(mp4|webm|mp3|wav|flac)$ {
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ----------------------------------------------------------
    # 4. JSON / manifest / service-worker：禁强缓存，每次协商
    # ----------------------------------------------------------
    location ~* \.(json|webmanifest)$ {
        add_header Cache-Control "no-cache" always;
    }

    # service-worker.js 必须实时更新，否则无法升级
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ----------------------------------------------------------
    # 5. SPA 路由回退：所有未命中的路径交给 index.html
    #    注意：回退的 index.html 仍是 no-cache
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------
    # 6. 安全相关头（与缓存配合，避免 MIME 嗅探等）
    # ----------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------
    # 7. 错误页面也走 SPA，避免刷新子路由 404
    # ----------------------------------------------------------
    error_page 404 /index.html;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
