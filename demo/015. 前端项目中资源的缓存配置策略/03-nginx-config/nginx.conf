# ====================================================================
# Nginx 缓存配置示例 - 前端资源缓存配置策略
# ====================================================================
# 本配置演示如何为前端项目配置分级缓存策略：
#   1. HTML 入口：no-cache（每次协商验证）
#   2. 带 hash 的 JS/CSS：max-age=31536000, immutable（一年强缓存）
#   3. 图片/字体：max-age=2592000（30 天缓存）
#   4. API 接口：no-store 或代理缓存
#   5. gzip 压缩 + ETag 协商缓存兜底
# ====================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ----- 日志格式 -----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'cache:$upstream_cache_status';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ====================================================================
    # gzip 压缩配置（减小传输体积，间接提升缓存效率）
    # ====================================================================
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ====================================================================
    # 代理缓存路径配置（用于 API 响应缓存）
    # ====================================================================
    proxy_cache_path /var/cache/nginx/api levels=1:2
        keys_zone=api_cache:10m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    # ----- ETag 默认开启（基于文件 mtime + size 生成）-----
    etag on;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # ====================================================================
        # 1. HTML 入口文件：禁止强缓存，每次协商验证
        #    原因：HTML 引用了带 hash 的 JS/CSS，必须每次获取最新引用
        # ====================================================================
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires off;
        }

        # ====================================================================
        # 2. 带 hash 的 JS 文件：一年强缓存 + immutable
        #    匹配规则：文件名中含 8 位以上十六进制 hash
        #    原因：内容变化 => hash 变化 => 文件名变化，可安全长期缓存
        # ====================================================================
        location ~* \.[a-f0-9]{8,}\.js$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }

        # ====================================================================
        # 3. 带 hash 的 CSS 文件：一年强缓存 + immutable
        # ====================================================================
        location ~* \.[a-f0-9]{8,}\.css$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }

        # ====================================================================
        # 4. 图片资源：30 天缓存
        #    更新频率较低，中等时长平衡命中率与及时性
        # ====================================================================
        location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|bmp)$ {
            add_header Cache-Control "public, max-age=2592000" always;
            access_log off;
        }

        # ====================================================================
        # 5. SVG 图片：协商缓存（可能内含业务逻辑，需验证）
        # ====================================================================
        location ~* \.svg$ {
            add_header Cache-Control "no-cache" always;
            expires 7d;
        }

        # ====================================================================
        # 6. 字体文件：一年强缓存（字体极少变化）
        # ====================================================================
        location ~* \.(woff2?|ttf|eot|otf)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
            access_log off;
        }

        # ====================================================================
        # 7. API 接口：使用代理缓存（5 分钟）+ no-store 兜底
        #    X-Cache-Status 暴露缓存命中状态：
        #    HIT/MISS/EXPIRED/STALE/UPDATING/REVALIDATED
        # ====================================================================
        location /api/ {
            proxy_cache api_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_pass http://backend:3000;
        }

        # ====================================================================
        # 8. 敏感 API（用户数据）：完全禁止缓存
        # ====================================================================
        location /api/user/ {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            proxy_pass http://backend:3000;
        }

        # ====================================================================
        # 9. SPA History 路由回退：所有未匹配路由返回 index.html
        # ====================================================================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ----- 自定义 404 页面 -----
        error_page 404 /index.html;
    }
}
